<!DOCTYPE html>
<html>
<head>
    <title>Popstock Terminal</title>
    <style>
        body { background: #0a0e17; color: #00c9a7; font-family: 'Courier New', monospace; padding: 20px; }
        input { background: #111927; border: 1px solid #00c9a7; color: white; padding: 12px; font-size: 16px; }
        button { background: #00c9a7; color: black; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }
        pre { 
            background: #0d1421; 
            padding: 25px; 
            border: 2px solid #00c9a7; 
            font-size: 18px; 
            line-height: 1.5;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 201, 167, 0.2);
        }
    </style>
</head>
<body>
    <h2>Popstock Trading Terminal</h2>
    <form method="POST">
        <input type="text" name="ticker" placeholder="Enter Ticker (e.g. BTC-USD)" required>
        <button type="submit">Analyze</button>
    </form>
    {% if result %}
        <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
